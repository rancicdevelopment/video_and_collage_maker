name: video_editor
description: "Video Editor Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  video_player: ^2.9.2
  audioplayers: ^6.1.0
  file_picker: ^8.1.7
  path_provider: ^2.1.4
  path: ^1.9.0
  video_thumbnail: ^0.5.3
  ffmpeg_kit_flutter_new: ^4.1.0
  waveform_extractor: ^1.2.0
  share_plus: ^10.1.4
  gal: ^1.3.0
  shimmer: ^3.0.0
  google_mobile_ads: ^5.3.0
  photo_manager: ^3.6.0
  url_launcher: ^6.3.1
  camera: ^0.11.0
  in_app_update: ^4.2.3
  firebase_core: ^3.13.1
  firebase_crashlytics: ^4.3.1
  http: ^1.2.2
  record: ^6.2.1
  in_app_review: ^2.0.9
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/new_logo512.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
